<!doctype html>
<html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gelato — Loop Player</title><style>html,body{margin:0;height:100%;background:#15130f;color:#eee6d9;font-family:Georgia,serif}body{display:grid;place-items:center;background:radial-gradient(circle at 50% 42%,#3a3126,#15130f 58%)}.l{text-align:center}.r{width:68px;height:68px;margin:auto;border:1px solid #d6ba7d;border-radius:50%;position:relative;animation:p 1.8s ease-in-out infinite}.r:after{content:'';position:absolute;inset:11px;border:1px solid rgba(238,230,217,.38);border-radius:50%;animation:p 1.8s .4s ease-in-out infinite}.l p{font-style:italic;letter-spacing:.09em}.l small{opacity:.55;letter-spacing:.18em}@keyframes p{50%{transform:scale(1.12);opacity:.42}}</style></head>
<body><div class="l"><div class="r"></div><p>ascolta · ripeti · ricorda</p><small>CARICAMENTO</small></div><script>
(async()=>{try{const a=[];for(let i=0;i<20;i++){const n=String(i).padStart(3,'0');const r=await fetch('parts/part-'+n+'.txt',{cache:'no-store'});if(!r.ok)throw new Error('Parte '+n);a.push(await r.text())}document.open();document.write(a.join(''));document.close()}catch(e){document.body.innerHTML='<div class="l"><p>Ricarica la pagina</p><small>'+e.message+'</small></div>'}})();
</script></body></html>
